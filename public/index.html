<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonWitch Admin Console</title>
    <style>
        :root {
            --bg-base: #0B0715;
            --bg-panel: #130D26;
            --bg-hover: #1A1333;
            --border-color: #2A1F4C;
            --primary: #8B5CF6;
            --primary-hover: #A78BFA;
            --danger: #EF4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- AUTHENTICATION GATE --- */
        #auth-gate {
            position: fixed; inset: 0;
            background: rgba(11, 7, 21, 0.85);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .auth-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 40px; border-radius: 16px;
            width: 100%; max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .auth-box h2 { margin: 0 0 10px 0; font-size: 1.5rem; font-weight: 700; color: white; }
        .auth-box p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }
        .auth-input {
            width: 100%; padding: 14px; box-sizing: border-box;
            background: var(--bg-base); border: 1px solid var(--border-color);
            color: white; border-radius: 8px; margin-bottom: 20px;
            text-align: center; font-size: 1rem; letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .auth-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
        .btn-glow {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--primary), #6D28D9);
            color: white; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); transform: translateY(-1px); }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 24px 16px;
            box-sizing: border-box;
        }
        .brand {
            display: flex; align-items: center; gap: 12px;
            padding: 0 12px 30px 12px; margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .brand svg { width: 28px; height: 28px; color: var(--primary); }
        .brand-text { font-size: 1.25rem; font-weight: 800; letter-spacing: 0.5px; }
        .brand-text span { color: var(--primary); }

        .nav-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
        .nav-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px; border-radius: 10px;
            color: var(--text-muted); cursor: pointer;
            font-weight: 600; font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .nav-item svg { width: 20px; height: 20px; opacity: 0.7; }
        .nav-item:hover { background: var(--bg-hover); color: white; }
        .nav-item.active { background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), transparent); color: var(--primary); border-left: 3px solid var(--primary); }
        .nav-item.active svg { opacity: 1; color: var(--primary); }
        
        .spacer { flex-grow: 1; }
        .nav-item.logout:hover { background: var(--danger-bg); color: var(--danger); }
        .nav-item.logout:hover svg { color: var(--danger); opacity: 1; }

        /* --- MAIN WORKSPACE --- */
        .main-content {
            flex-grow: 1; background: var(--bg-base);
            padding: 40px; overflow-y: auto;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .header-title h1 { margin: 0 0 8px 0; font-size: 2rem; font-weight: 700; }
        .header-title p { margin: 0; color: var(--text-muted); font-size: 1rem; }

        /* Generator Panel */
        .generator-panel {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            padding: 24px; border-radius: 16px; margin-bottom: 40px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; align-items: end;
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input, .input-group select {
            background: var(--bg-base); border: 1px solid var(--border-color);
            color: white; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem;
            outline: none; transition: border 0.2s;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary); }
        
        /* Data Table */
        .table-container {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: 16px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { 
            padding: 18px 24px; background: rgba(0,0,0,0.2); 
            color: var(--text-muted); font-size: 0.85rem; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color);
        }
        td { padding: 18px 24px; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .badge-key { 
            background: rgba(139, 92, 246, 0.1); color: var(--primary-hover); 
            padding: 6px 12px; border-radius: 6px; font-family: monospace; font-size: 1rem; border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .badge-scope {
            background: var(--bg-base); color: var(--text-muted);
            padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--border-color);
        }

        .actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-icon {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-muted); width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--bg-hover); color: white; border-color: var(--text-main); }
        .btn-icon.delete:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
        .btn-icon svg { width: 16px; height: 16px; }

    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-box">
            <h2>System Secure Lock</h2>
            <p>Establish terminal connection to proceed.</p>
            <input type="password" id="auth-password" class="auth-input" placeholder="Enter Token" onkeypress="handleEnter(event)">
            <button class="btn-glow" onclick="login()">Initialize Session</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <div class="brand-text">Admin <span>Command</span></div>
        </div>
        <ul class="nav-list">
            <li class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Overview
            </li>
            <li class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Key Management
            </li>
            <li class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                Services Config
            </li>
            <div class="spacer"></div>
            <li class="nav-item logout" onclick="logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Exit Admin
            </li>
        </ul>
    </div>

    <div class="main-content">
        
        <div class="header-top">
            <div class="header-title">
                <h1>Token Management</h1>
                <p id="total-keys-text">Total Active Keys: 0</p>
            </div>
        </div>

        <div class="generator-panel">
            <div class="input-group">
                <label>Client Label</label>
                <input type="text" id="form-label" placeholder="e.g. VIP User">
            </div>
            <div class="input-group">
                <label>Custom Alias (Optional)</label>
                <input type="text" id="form-custom" placeholder="Auto-generated if empty">
            </div>
            <div class="input-group">
                <label>Access Scope</label>
                <select id="form-scope">
                    <option value="all">Unrestricted (All Endpoints)</option>
                    <option value="number">/api/number</option>
                    <option value="aadhar">/api/aadhar</option>
                    <option value="upi">/api/upi</option>
                    <option value="pan">/api/pan</option>
                    <option value="veh2num">/api/veh2num</option>
                    <option value="vehicle">/api/vehicle</option>
                    <option value="tg">/api/tg</option>
                    <option value="bomber">/api/bomber</option>
                </select>
            </div>
            <div class="input-group">
                <label>Duration (Days)</label>
                <input type="number" id="form-days" placeholder="0 = Lifetime">
            </div>
            <button class="btn-glow" style="padding:12px; height:45px;" onclick="generateKey()">Provision Key</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Label Name</th>
                        <th>API Token String</th>
                        <th>Scope</th>
                        <th>Expiration Date</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        // AUTHENTICATION LOGIC
        let adminPass = sessionStorage.getItem('mw_admin_pass') || '';

        if (adminPass === 'kaddulele') {
            document.getElementById('auth-gate').style.display = 'none';
            fetchData();
        }

        function handleEnter(e) { if (e.key === 'Enter') login(); }

        async function login() {
            const val = document.getElementById('auth-password').value;
            const res = await fetch('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: val })
            });
            if (res.ok) {
                adminPass = val;
                sessionStorage.setItem('mw_admin_pass', val);
                document.getElementById('auth-gate').style.display = 'none';
                fetchData();
            } else {
                alert('Authentication Failed. Invalid terminal password.');
            }
        }

        function logout() {
            sessionStorage.removeItem('mw_admin_pass');
            window.location.reload();
        }

        // DATA LOGIC
        async function fetchData() {
            try {
                const res = await fetch('/api/admin/keys/list', {
                    method: 'POST',
                    headers: { 'x-admin-password': adminPass }
                });
                
                if (!res.ok) return logout(); // Kick out if session is dead

                const data = await res.json();
                const tbody = document.getElementById('table-body');
                document.getElementById('total-keys-text').innerText = `Total Active Keys: ${data.length}`;
                
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:50px; color:var(--text-muted);">No tokens provisioned in the database.</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td style="font-weight:600; color:white;">${item.label}</td>
                        <td><span class="badge-key">${item.key}</span></td>
                        <td><span class="badge-scope">${item.allowedLookup}</span></td>
                        <td style="color:var(--text-muted);">${item.expiresAt ? new Date(item.expiresAt).toLocaleDateString() : 'Lifetime Access'}</td>
                        <td>
                            <div class="actions">
                                <button class="btn-icon" onclick="copyToClipboard('${item.key}')" title="Copy Key">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                                <button class="btn-icon delete" onclick="deleteKey('${item.key}')" title="Revoke Key">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).reverse().join('');
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        async function generateKey() {
            const label = document.getElementById('form-label').value;
            const customKey = document.getElementById('form-custom').value;
            const allowedLookup = document.getElementById('form-scope').value;
            const daysValid = document.getElementById('form-days').value;

            const res = await fetch('/api/admin/keys/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPass },
                body: JSON.stringify({ label, customKey, allowedLookup, daysValid })
            });

            const data = await res.json();
            if (data.error) return alert(data.error);

            document.getElementById('form-label').value = '';
            document.getElementById('form-custom').value = '';
            document.getElementById('form-days').value = '';
            fetchData();
        }

        async function deleteKey(key) {
            if (confirm('Permanently revoke this API Key?')) {
                await fetch('/api/admin/keys/revoke', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPass },
                    body: JSON.stringify({ keyToDelete: key })
                });
                fetchData();
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('Token copied to clipboard!');
        }
    </script>
</body>
</html>
