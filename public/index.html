<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonWitch API Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #9b59b6;
            --primary-hover: #8e44ad;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 800px; }
        h1 { margin-bottom: 5px; }
        p { color: var(--text-muted); margin-bottom: 30px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: var(--primary-hover); }
        button.danger { background-color: #e74c3c; }
        button.secondary { background-color: transparent; border: 1px solid var(--primary); color: var(--primary); }
        
        .key-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .key-row:last-child { border-bottom: none; }
        .key-text { font-family: monospace; font-size: 1.1em; color: var(--primary); }
        .actions { display: flex; gap: 10px; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>MoonWitch OSINT</h1>
    <p>API Key Management Dashboard (Local Host)</p>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Active Keys</h2>
            <button onclick="generateKey()">+ Generate New Key</button>
        </div>

        <div id="keys-container">
            <div class="empty-state">Loading keys...</div>
        </div>
    </div>
</div>

<script>
    async function fetchKeys() {
        try {
            const response = await fetch('/api/admin/keys');
            if (!response.ok) throw new Error('Network response was not ok');
            const keys = await response.json();
            renderKeys(keys);
        } catch (error) {
            console.error("Failed to load keys", error);
            document.getElementById('keys-container').innerHTML = 
                '<div class="empty-state" style="color: #e74c3c;">Failed to connect to backend. Is the server running?</div>';
        }
    }

    function renderKeys(keys) {
        const container = document.getElementById('keys-container');
        container.innerHTML = ''; 

        if (keys.length === 0) {
            container.innerHTML = '<div class="empty-state">No API keys found. Generate one to get started.</div>';
            return;
        }

        keys.forEach(key => {
            const row = document.createElement('div');
            row.className = 'key-row';
            row.innerHTML = `
                <span class="key-text">${key}</span>
                <div class="actions">
                    <button class="secondary" onclick="copyToClipboard('${key}')">Copy</button>
                    <button class="secondary" onclick="regenerateKey('${key}')">Regenerate</button>
                    <button class="danger" onclick="deleteKey('${key}')">Delete</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    async function generateKey() {
        await fetch('/api/admin/keys', { method: 'POST' });
        fetchKeys();
    }

    async function deleteKey(key) {
        if(confirm('Are you sure you want to delete this key?')) {
            await fetch(`/api/admin/keys/${key}`, { method: 'DELETE' });
            fetchKeys();
        }
    }

    async function regenerateKey(oldKey) {
        if(confirm('Regenerating will invalidate the old key. Continue?')) {
            await fetch(`/api/admin/keys/${oldKey}`, { method: 'PUT' });
            fetchKeys();
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert('Copied to clipboard: ' + text);
    }

    fetchKeys();
</script>
</body>
</html>
